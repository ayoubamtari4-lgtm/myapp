// 🔍 search
function searchSite(){

let code = document.getElementById("siteInput").value.trim().toUpperCase();

if(!code){
clearFields();
return;
}

let d = data[code];

if(d){
document.getElementById("class").innerText = d.class;
document.getElementById("centre").innerText = d.centre;
document.getElementById("autonomie").innerText = d.autonomie;
document.getElementById("tech").innerText = d.technicien;
document.getElementById("contact").innerText = d.contact;
document.getElementById("lat").innerText = d.latitude || "";
document.getElementById("lng").innerText = d.longitude || "";
}else{
clearFields();
}

}

// 🧹 clear
function clearFields(){
["class","centre","autonomie","tech","contact","lat","lng"].forEach(id=>{
document.getElementById(id).innerText="";
});
}

// 📲 WhatsApp
function sendWhatsApp(){
let msg =
"Site: " + siteInput.value + "\n" +
"Alarme: " + alarme.value + "\n" +
"Impact: " + impact.value + "\n" +
"Class: " + document.getElementById("class").innerText + "\n" +
"Down Time: " + date.value + "\n" +
"Centre: " + document.getElementById("centre").innerText + "\n" +
"Autonomie: " + document.getElementById("autonomie").innerText + "\n" +

"RC: " + rc.value + "\n" +
"PA: " + pa.value + "\n" +

"Ticket: " + ticket.value + "\n" +
"Technicien: " + document.getElementById("tech").innerText + "\n" +
"Contact: " + document.getElementById("contact").innerText + "\n" +
"Latitude: " + document.getElementById("lat").innerText + "\n" +
"Longitude: " + document.getElementById("lng").innerText;

window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}
function copyMessage(){

let msg =
"Site: " + siteInput.value + "\n" +
"Alarme: " + alarme.value + "\n" +
"Impact: " + impact.value + "\n" +
"Class: " + document.getElementById("class").innerText + "\n" +
"Down Time: " + date.value.replace("T"," ") + "\n" +
"Centre: " + document.getElementById("centre").innerText + "\n" +
"Autonomie: " + document.getElementById("autonomie").innerText + "\n" +

"RC: " + rc.value + "\n" +
"PA: " + pa.value + "\n" +
"Ticket: " + ticket.value + "\n" +
"Technicien: " + document.getElementById("tech").innerText + "\n" +
"Contact: " + document.getElementById("contact").innerText + "\n" +
"Latitude: " + document.getElementById("lat").innerText + "\n" +
"Longitude: " + document.getElementById("lng").innerText;

navigator.clipboard.writeText(msg);

alert("Message copié ✅");

}
function openMap(){

let lat = document.getElementById("lat").innerText;
let lng = document.getElementById("lng").innerText;

if(!lat || !lng){
  alert("Latitude / Longitude vide ❌");
  return;
}

// عرض داخل الصفحة
document.getElementById("mapFrame").src =
"https://maps.google.com/maps?q=" + lat + "," + lng + "&z=15&output=embed";

}
